<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Network</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Login/Register View -->
        <div id="auth-view" class="view">
            <div class="auth-container">
                <h1>P2P Network</h1>
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Login</button>
                    <button class="tab-btn" data-tab="register">Register</button>
                </div>
                
                <!-- Login Form -->
                <form id="login-form" class="auth-form">
                    <input type="text" name="username" placeholder="Username or Email" required>
                    <input type="password" name="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                
                <!-- Register Form -->
                <form id="register-form" class="auth-form hidden">
                    <input type="text" name="username" placeholder="Username" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="password" name="password" placeholder="Password" required>
                    <button type="submit">Register</button>
                </form>
                
                <div id="auth-error" class="error-message hidden"></div>
            </div>
        </div>

        <!-- Main App View -->
        <div id="main-view" class="view hidden">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>P2P Network</h2>
                    <button id="logout-btn" class="icon-btn" title="Logout">🚪</button>
                </div>
                
                <div class="search-box">
                    <input type="text" id="user-search" placeholder="Search users...">
                </div>
                
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="peers">Peers</button>
                    <button class="tab-btn" data-tab="messages">Messages</button>
                </div>
                
                <!-- Peers List -->
                <div id="peers-list" class="sidebar-content active">
                    <h3>Discover Peers</h3>
                    <div id="peers-container"></div>
                </div>
                
                <!-- Conversations List -->
                <div id="messages-list" class="sidebar-content">
                    <h3>Conversations</h3>
                    <div id="conversations-container"></div>
                </div>
            </aside>

            <!-- Chat Area -->
            <main class="chat-area">
                <div id="no-chat" class="empty-state">
                    <p>Select a peer to start chatting</p>
                </div>
                
                <!-- P2P Chat Interface -->
                <div id="chat-interface" class="hidden">
                    <div class="chat-header">
                        <div class="chat-peer-info">
                            <div class="avatar" id="chat-peer-avatar"></div>
                            <div class="peer-details">
                                <span class="peer-name" id="chat-peer-name"></span>
                                <span class="peer-status" id="chat-peer-status"></span>
                            </div>
                        </div>
                        <div class="chat-actions">
                            <button id="p2p-call-btn" class="icon-btn" title="Start P2P Call">📞</button>
                            <button id="start-p2p-btn" class="btn" title="Start P2P Connection">🔗 P2P</button>
                        </div>
                    </div>
                    
                    <!-- P2P Status -->
                    <div id="p2p-status" class="p2p-status hidden">
                        <span class="status-text"></span>
                        <div class="p2p-progress">
                            <div class="progress-bar"></div>
                        </div>
                    </div>
                    
                    <!-- Messages -->
                    <div id="chat-messages" class="chat-messages"></div>
                    
                    <!-- File Transfer -->
                    <div id="file-transfer" class="file-transfer hidden">
                        <div class="transfer-info">
                            <span class="file-name"></span>
                            <span class="file-progress">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress"></div>
                        </div>
                    </div>
                    
                    <!-- Message Input -->
                    <form id="message-form" class="message-input">
                        <button type="button" id="attach-btn" class="icon-btn">📎</button>
                        <input type="text" id="message-input" placeholder="Type a message...">
                        <button type="submit" class="send-btn">Send</button>
                    </form>
                    
                    <!-- Hidden file input -->
                    <input type="file" id="file-input" hidden>
                </div>
            </main>
        </div>
        
        <!-- P2P Video Call Modal -->
        <div id="call-modal" class="modal hidden">
            <div class="modal-content">
                <h3>P2P Video Call</h3>
                <div class="video-container">
                    <video id="local-video" autoplay muted></video>
                    <video id="remote-video" autoplay></video>
                </div>
                <div class="call-controls">
                    <button id="end-call-btn" class="btn btn-danger">End Call</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
